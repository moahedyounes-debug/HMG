<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>نظام البحث في المخزون – مستشفيات الحبيب</title>

<style>
    body {
        font-family: Arial;
        margin: 0;
        padding: 0;
        background: url('Alhabib.png') no-repeat center center fixed;
        background-size: 40%;
        opacity: 0.98;
    }

    .header {
        background: white;
        padding: 15px;
        text-align: center;
        border-bottom: 2px solid #ddd;
    }

    .header img {
        height: 80px;
    }

    .container {
        padding: 20px;
    }

    h2 {
        color: #333;
        text-align: center;
        margin-bottom: 25px;
    }

    #search {
        width: 100%;
        padding: 15px;
        font-size: 20px;
        border: 2px solid #aaa;
        border-radius: 8px;
        margin-bottom: 20px;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        background: white;
    }

    th, td {
        border: 1px solid #ccc;
        padding: 12px;
        text-align: center;
        font-size: 18px;
    }

    th {
        background: #eee;
    }

    .report-btn {
        background: #d9534f;
        color: white;
        border: none;
        padding: 10px 20px;
        font-size: 16px;
        border-radius: 6px;
        cursor: pointer;
    }

    .popup {
        display: none;
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.6);
        justify-content: center;
        align-items: center;
    }

    .popup-content {
        background: white;
        padding: 25px;
        width: 350px;
        text-align: center;
        border-radius: 10px;
        box-shadow: 0 0 10px #333;
    }

    .popup button {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        font-size: 18px;
        cursor: pointer;
        border-radius: 6px;
        border: none;
    }

    .btn1 { background: #d9534f; color: white; }
    .btn2 { background: #0275d8; color: white; }

    .success {
        display: none;
        position: fixed;
        top: 40%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: white;
        padding: 25px;
        border-radius: 10px;
        text-align: center;
        box-shadow: 0 0 10px #333;
        font-size: 20px;
    }
</style>
</head>

<body>

<div class="header">
    <img src="Alhabib.png">
</div>

<div class="container">

<h2>🔍 البحث عن المنتج</h2>

<input id="search" placeholder="ابحث برقم الصنف أو اسم المنتج" oninput="searchProduct()">

<table id="resultTable" style="display:none;">
    <thead>
        <tr>
            <th>رقم الصنف</th>
            <th>اسم المنتج</th>
            <th>رفع تقرير</th>
        </tr>
    </thead>
    <tbody id="resultBody"></tbody>
</table>

</div>

<div class="popup" id="popup">
    <div class="popup-content">
        <h3>اختر نوع التقرير</h3>
        <button class="btn1" onclick="sendReport('عدم تطابق المنتج')">عدم تطابق المنتج</button>
        <button class="btn2" onclick="sendReport('المنتج غير معرف')">المنتج غير معرف</button>
    </div>
</div>

<div class="success" id="successBox"></div>

<script>
let products = [];
let selectedItem = "";

fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vRFLVRgFOuY-waesrytMd_KEZ1wwkS6qcT4Ep-n5VERE8qdRCz1V_hFwZ_amkqJPU6rG-i-t2ViHcpq/pub?output=csv")
    .then(res => res.text())
    .then(csv => {
        let lines = csv.split("\n");
        products = lines.slice(1).map(line => {
            let cols = line.split(",");
            return {
                item_code: cols[0]?.trim(),
                name: cols[1]?.trim()
            };
        });
    });

function searchProduct() {
    let q = document.getElementById("search").value.trim();
    let result = products.filter(p =>
        p.item_code.includes(q) ||
        p.name.includes(q)
    );

    let table = document.getElementById("resultTable");
    let body = document.getElementById("resultBody");
    body.innerHTML = "";

    if (result.length > 0) {
        table.style.display = "table";
        result.forEach(p => {
            body.innerHTML += `
                <tr>
                    <td>${p.item_code}</td>
                    <td>${p.name}</td>
                    <td><button class="report-btn" onclick="openPopup('${p.item_code}', '${p.name}')">رفع تقرير</button></td>
                </tr>
            `;
        });
    } else {
        table.style.display = "none";
    }
}

function openPopup(code, name) {
    selectedItem = { code, name };
    document.getElementById("popup").style.display = "flex";
}

function sendReport(type) {
    document.getElementById("popup").style.display = "none";

    let msg = `تم إرسال إشعار بالخطأ: "${type}" للمنتج "${selectedItem.name}"`;

    let box = document.getElementById("successBox");
    box.innerHTML = msg;
    box.style.display = "block";

    setTimeout(() => {
        box.style.display = "none";
    }, 30000);
}
</script>

</body>
</html>
