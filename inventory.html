<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>نظام البحث في المخزون – مستشفيات الحبيب</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>
    body {
        font-family: Arial;
        margin: 0;
        padding: 0;
        background: url('Alhabib.png') no-repeat center center fixed;
        background-size: 40%;
        opacity: 0.98;
    }

    .header {
        background: white;
        padding: 15px;
        text-align: center;
        border-bottom: 2px solid #ddd;
    }

    .header img {
        height: 80px;
    }

    .container {
        padding: 20px;
    }

    h2 {
        color: #333;
        text-align: center;
        margin-bottom: 25px;
    }

    #search {
        width: 100%;
        padding: 15px;
        font-size: 20px;
        border: 2px solid #aaa;
        border-radius: 8px;
        margin-bottom: 20px;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        background: white;
    }

    th, td {
        border: 1px solid #ccc;
        padding: 12px;
        text-align: center;
        font-size: 18px;
    }

    th {
        background: #eee;
    }

    .report-btn {
        background: #d9534f;
        color: white;
        border: none;
        padding: 10px 20px;
        font-size: 16px;
        border-radius: 6px;
        cursor: pointer;
    }

    .popup {
        display: none;
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.6);
        justify-content: center;
        align-items: center;
    }

    .popup-content {
        background: white;
        padding: 25px;
        width: 350px;
        text-align: center;
        border-radius: 10px;
        box-shadow: 0 0 10px #333;
    }

    .popup button {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        font-size: 18px;
        cursor: pointer;
        border-radius: 6px;
        border: none;
    }

    .btn1 { background: #d9534f; color: white; }
    .btn2 { background: #0275d8; color: white; }

    .success {
        display: none;
        position: fixed;
        top: 40%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: white;
        padding: 25px;
        border-radius: 10px;
        text-align: center;
        box-shadow: 0 0 10px #333;
        font-size: 20px;
    }
</style>
</head>

<body>

<div class="header">
    <img src="Alhabib.png">
</div>

<div class="container">

<h2>🔍 البحث عن المنتج</h2>

<input id="search" placeholder="جاري تحميل البيانات..." disabled oninput="searchProduct()">

<table id="resultTable" style="display:none;">
    <thead>
        <tr>
            <th>رقم الصنف</th>
            <th>اسم المنتج</th>
            <th>رفع تقرير</th>
        </tr>
    </thead>
    <tbody id="resultBody"></tbody>
</table>

</div>

<div class="popup" id="popup">
    <div class="popup-content">
        <h3>اختر نوع التقرير</h3>
        <button class="btn1" onclick="sendReport('عدم تطابق المنتج')">عدم تطابق المنتج</button>
        <button class="btn2" onclick="sendReport('المنتج غير معرف')">المنتج غير معرف</button>
    </div>
</div>

<div class="success" id="successBox"></div>

<script>
// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyDQBMN_t-wAFubPPL9iI31g_sZbIWTP1oE",
  authDomain: "hmgsa-d4a90.firebaseapp.com",
  projectId: "hmgsa-d4a90",
  storageBucket: "hmgsa-d4a90.firebasestorage.app",
  messagingSenderId: "859153120328",
  appId: "1:859153120328:web:a06ca08f8e6e39bf48ac7d",
  measurementId: "G-YPGYMJGBKT"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let products = [];
let selectedItem = "";
let dataLoaded = false;

// Load products from Firestore
db.collection("products").get().then(snapshot => {
    products = snapshot.docs.map(doc => doc.data());
    dataLoaded = true;

    document.getElementById("search").disabled = false;
    document.getElementById("search").placeholder = "ابحث برقم الصنف أو اسم المنتج";
});

// Search function
function searchProduct() {
    if (!dataLoaded) return;

    let q = document.getElementById("search").value.trim();
    let result = products.filter(p =>
        p.item_code.includes(q) ||
        p.name.includes(q)
    );

    let table = document.getElementById("resultTable");
    let body = document.getElementById("resultBody");
    body.innerHTML = "";

    if (result.length > 0) {
        table.style.display = "table";
        result.forEach(p => {
            body.innerHTML += `
                <tr>
                    <td>${p.item_code}</td>
                    <td>${p.name}</td>
                    <td><button class="report-btn" onclick="openPopup('${p.item_code}', '${p.name}')">رفع تقرير</button></td>
                </tr>
            `;
        });
    } else {
        table.style.display = "none";
    }
}

function openPopup(code, name) {
    selectedItem = { code, name };
    document.getElementById("popup").style.display = "flex";
}

function sendReport(type) {
    document.getElementById("popup").style.display = "none";

    db.collection("reports").add({
        item_code: selectedItem.code,
        name: selectedItem.name,
        type: type,
        timestamp: new Date().toISOString()
    });

    let msg = `تم إرسال إشعار بالخطأ: "${type}" للمنتج "${selectedItem.name}"`;

    let box = document.getElementById("successBox");
    box.innerHTML = msg;
    box.style.display = "block";

    setTimeout(() => {
        box.style.display = "none";
    }, 30000);
}
</script>

</body>
</html>
